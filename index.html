<div id="addModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;">
    <div style="background:white; width:90%; margin:20px auto; padding:20px; border-radius:15px; max-height:80vh; overflow-y:auto;">
        <h3>新增評價</h3>
        <label>車牌號碼</label>
        <input type="text" id="plate" placeholder="ABC-1234" style="width:100%; margin-bottom:10px; padding:8px;">
        
        <label>駕駛姓名</label>
        <input type="text" id="name" placeholder="王小明" style="width:100%; margin-bottom:10px; padding:8px;">
        
        <label>駕駛風格</label>
        <select id="style" style="width:100%; margin-bottom:10px; padding:8px;">
            <option value="平穩舒適">平穩舒適</option>
            <option value="開快車">開快車</option>
            <option value="會鑽車">會鑽車</option>
        </select>

        <label>是否有煙味 🚭</label>
        <input type="checkbox" id="smoke"> 有
        
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button onclick="submitNewReview()" style="flex:1; background:#f39c12; color:white; border:none; padding:10px; border-radius:5px;">送出</button>
            <button onclick="closeModal()" style="flex:1; background:#ccc; border:none; padding:10px; border-radius:5px;">取消</button>
        </div>
    </div>
</div>

<script>
    // 開啟表單
    function openModal() {
        document.getElementById('addModal').style.display = 'block';
    }

    // 關閉表單
    function closeModal() {
        document.getElementById('addModal').style.display = 'none';
    }

    // 將按鈕的 onclick 改為 openModal()
    // <div class="fab" onclick="openModal()">+</div>

    function submitNewReview() {
        // 這裡放原本 addReview 的邏輯
        // 成功後記得呼叫 closeModal()
        alert("資料已準備送出！");
        closeModal();
    }
</script>
